<svg xmlns="http://www.w3.org/2000/svg" width="380" height="170" viewBox="0 0 380 170">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
    <clipPath id="iconClip">
      <circle cx="36" cy="80" r="20"/>
    </clipPath>
  </defs>

  <!-- Toast card -->
  <rect x="10" y="10" width="360" height="145" rx="8" fill="#2d2d2d" filter="url(#shadow)"/>

  <!-- Top bar -->
  <rect x="10" y="10" width="360" height="32" rx="8" fill="#252525"/>
  <rect x="10" y="34" width="360" height="8" fill="#252525"/>

  <!-- App icon (small) -->
  <circle cx="26" cy="26" r="8" fill="#e94560"/>
  <text x="26" y="30" font-family="Segoe UI, Arial" font-size="10" fill="white" text-anchor="middle" font-weight="700">C</text>

  <!-- App name -->
  <text x="40" y="30" font-family="Segoe UI, Arial" font-size="12" fill="#999999">Claude Code</text>

  <!-- Timestamp -->
  <text x="340" y="30" font-family="Segoe UI, Arial" font-size="11" fill="#666666" text-anchor="end">now</text>

  <!-- Close button -->
  <text x="358" y="30" font-family="Segoe UI, Arial" font-size="14" fill="#666666" text-anchor="end">x</text>

  <!-- App logo (large circle) -->
  <circle cx="36" cy="85" r="20" fill="#e94560"/>
  <text x="36" y="92" font-family="Segoe UI, Arial" font-size="20" fill="white" text-anchor="middle" font-weight="700">C</text>

  <!-- Notification title -->
  <text x="66" y="75" font-family="Segoe UI, Arial" font-size="14" fill="#ffffff" font-weight="600">Claude Code - my-project</text>

  <!-- Notification body -->
  <text x="66" y="95" font-family="Segoe UI, Arial" font-size="13" fill="#cccccc">I've completed the refactoring of the</text>
  <text x="66" y="112" font-family="Segoe UI, Arial" font-size="13" fill="#cccccc">authentication module. All tests pass...</text>

  <!-- Click hint -->
  <rect x="10" y="125" width="360" height="30" rx="0" fill="#353535"/>
  <rect x="10" y="147" width="360" height="8" rx="8" fill="#353535"/>
  <text x="190" y="144" font-family="Segoe UI, Arial" font-size="11" fill="#e94560" text-anchor="middle">Click to focus terminal window</text>

  <!-- Cursor icon -->
  <g transform="translate(330, 115) scale(0.5)" fill="#e94560" opacity="0.8">
    <path d="M0 0L0 36L10 26L18 40L24 37L16 23L28 23Z"/>
  </g>
</svg>
