name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create zip bundle
        run: |
          VERSION=${GITHUB_REF_NAME}
          zip -r "claude-code-notification-${VERSION}.zip" \
            install.ps1 uninstall.ps1 src/ config/ assets/ README.md LICENSE CHANGELOG.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: claude-code-notification-*.zip
